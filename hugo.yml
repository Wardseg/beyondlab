      Real guides. Real mistakes. Real fixes.
      I'm Ward 👋 , an IT support engineer and homelabber sharing everthing I learn - 
      from setting up VLANs and self-hosted services to solving the weird issues
      you'll never find in the official docs.
  socialIcons:
    - name: github
      url: "https://github.com/yourusername"

menu:
  main:
    - name: Blog
      url: /posts
      weight: 1
    - name: About
      url: /about
      weight: 2
    - name: Tags
      url: /tags
      weight: 3

outputs:
  home:
    - HTML
    - RSS
    - JSON
