baseURL: "https://beyondlab.dev"
languageCode: "en-us"
title: "BeyondLab"
theme: "PaperMod"
pagination:
  pagerSize: 10

params:
  author: "Ward"
  description: "Homelab, networking and IT — beyond the basics"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  comments: true

  homeInfoParams:
    Title: "IT kwnowledge that goes Beyond the Lab"
