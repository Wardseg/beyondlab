<div class="giscus-container">
  <script
    src="https://giscus.app/client.js"
    data-repo="wardseg/beyondlab"
    data-repo-id="R_kgDOSfzEHQ"
    data-category="Announcements"
    data-category-id="DIC_kwDOSfzEHc4C9Z8n"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="1"
    data-input-position="bottom"
    data-theme="transparent_dark"
    data-lang="en"
    crossorigin="anonymous"
    async
  ></script>
</div>

<script>
  function setGiscusTheme(theme) {
    const iframe = document.querySelector("iframe.giscus-frame");
    if (!iframe) return;
    iframe.contentWindow.postMessage(
      { giscus: { setConfig: { theme: theme } } },
      "https://giscus.app",
    );
  }

  function getPreferredTheme() {
    const stored = localStorage.getItem("pref-theme");
    if (stored === "light") return "light";
    if (stored === "dark") return "transparent_dark";
    return window.matchMedia("(prefers-color-scheme: dark)").matches
      ? "transparent_dark"
      : "light";
  }

  window.addEventListener(
    "message",
    function (e) {
      if (e.origin !== "https://giscus.app") return;
      if (
        e.data?.giscus?.discussion !== undefined ||
        e.data?.giscus?.error !== undefined
      )
        return;
      setGiscusTheme(getPreferredTheme());
    },
    { once: true },
  );

  const themeToggle = document.getElementById("theme-toggle");
  if (themeToggle) {
    themeToggle.addEventListener("click", function () {
      setTimeout(() => setGiscusTheme(getPreferredTheme()), 100);
    });
  }
</script>
